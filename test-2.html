<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>test-2</title>
</head>
<body>
<todo-app></todo-app>

<script type="module">
import { LitElement, html } from 'https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js';

// --- Bus ---
const appBus = new EventTarget();

// --- Ports ---
class AddTodoCmd extends CustomEvent {
  static TYPE = 'port:in:todo:add';
  constructor(payload) {
    if (!payload || typeof payload.text !== 'string') {
      throw new TypeError('AddTodoCmd needs { text: string }');
    }
    super(AddTodoCmd.TYPE, { detail: payload });
  }
}

class RemoveTodoCmd extends CustomEvent {
  static TYPE = 'port:in:todo:remove';
  constructor(payload) {
    if (!payload || typeof payload.index !== 'number') {
      throw new TypeError('RemoveTodoCmd needs { index: number }');
    }
    super(RemoveTodoCmd.TYPE, { detail: payload });
  }
}

class TodosUpdated extends CustomEvent {
  static TYPE = 'port:out:todo:updated';
  constructor(payload) {
    if (!payload || !Array.isArray(payload.todos)) {
      throw new TypeError('TodosUpdated needs { todos: Array }');
    }
    super(TodosUpdated.TYPE, { detail: payload });
  }
}

// --- Extra port with NO adapter wired up ---
class MissingCmd extends CustomEvent {
  static TYPE = 'port:in:missing';
  constructor() {
    super(MissingCmd.TYPE, { detail: {} });
  }
}

// --- Extra port for the broken adapter ---
class BreakCmd extends CustomEvent {
  static TYPE = 'port:in:break';
  constructor() {
    super(BreakCmd.TYPE, { detail: {} });
  }
}

// --- Core ---
class TodoDomain {
  state = { todos: [] };

  add(text) {
    const t = text.trim();
    if (!t) return this.state;
    this.state = { todos: [...this.state.todos, t] };
    return this.state;
  }

  remove(index) {
    this.state = { todos: this.state.todos.filter((_, i) => i !== index) };
    return this.state;
  }
}

// --- Bus Adapter ---
function startAdapter(bus) {
  const domain = new TodoDomain();

  bus.addEventListener(AddTodoCmd.TYPE, (e) => {
    const nextState = domain.add(e.detail.text);
    bus.dispatchEvent(new TodosUpdated(nextState));
  });

  bus.addEventListener(RemoveTodoCmd.TYPE, (e) => {
    const nextState = domain.remove(e.detail.index);
    bus.dispatchEvent(new TodosUpdated(nextState));
  });
}

// --- Broken Adapter ---
// Listens to BreakCmd and tries to dispatch an invalid TodosUpdated.
// This throws a TypeError the moment the event is constructed.
function startBrokenAdapter(bus) {
  bus.addEventListener(BreakCmd.TYPE, () => {
    // ERROR: todos is a string, not an array
    bus.dispatchEvent(new TodosUpdated({ todos: 'this-is-not-an-array' }));
  });
}

// --- UI Adapter ---
class TodoApp extends LitElement {
  static properties = {
    _todos: {},
    _logs: {}
  };

  constructor() {
    super();
    this._todos = [];
    this._logs = [];
    this._onStateChange = (e) => {
      this._log('TodosUpdated received', e.detail);
      this._todos = e.detail.todos;
    };
  }

  _log(label, data) {
    const ts = new Date().toLocaleTimeString();
    const entry = `[${ts}] ${label}: ${JSON.stringify(data)}`;
    this._logs = [...this._logs.slice(-19), entry];
  }

  connectedCallback() {
    super.connectedCallback();
    appBus.addEventListener(TodosUpdated.TYPE, this._onStateChange);
  }

  disconnectedCallback() {
    appBus.removeEventListener(TodosUpdated.TYPE, this._onStateChange);
    super.disconnectedCallback();
  }

  _submit(e) {
    e.preventDefault();
    const input = this.renderRoot.querySelector('input');
    try {
      const cmd = new AddTodoCmd({ text: input.value });
      this._log('AddTodoCmd dispatched', cmd.detail);
      appBus.dispatchEvent(cmd);
      input.value = '';
    } catch (err) {
      this._log('CATCHED ERROR (AddTodoCmd)', err.message);
      console.error(err);
    }
  }

  render() {
    return html`
      <form @submit=${this._submit}>
        <input placeholder="What needs to be done?">
        <button>Add</button>
      </form>
      <ul>
        ${this._todos.map((t, i) => html`
          <li>
            ${t}
            <button @click=${() => {
              const cmd = new RemoveTodoCmd({ index: i });
              this._log('RemoveTodoCmd dispatched', cmd.detail);
              appBus.dispatchEvent(cmd);
            }}>Delete</button>
          </li>
        `)}
      </ul>

      <hr>
      <h3>Error Scenarios</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button @click=${this._badPayload}>1. Bad Payload (Port Validation)</button>
        <button @click=${this._wrongType}>2. Wrong Event Type (Silent)</button>
        <button @click=${this._missingAdapter}>3. Missing Adapter (Silent)</button>
        <button @click=${this._brokenAdapter}>4. Broken Adapter (Throws)</button>
      </div>
      <hr>
      <pre>${this._logs.join('\n')}</pre>
    `;
  }

  // 1. Pass wrong data type into a Port constructor.
  // The class validates immediately and throws TypeError.
  _badPayload() {
    try {
      new AddTodoCmd({ text: 12345 });
    } catch (err) {
      this._log('CATCHED ERROR (Bad Payload)', err.message);
      console.error(err);
    }
  }

  // 2. Dispatch an event with a type string nobody is listening to.
  // Nothing breaks, but nothing happens. Silent failure.
  _wrongType() {
    appBus.dispatchEvent(new CustomEvent('totally-wrong-event', { detail: { foo: 'bar' } }));
    this._log('Dispatched wrong-type event', { type: 'totally-wrong-event' });
  }

  // 3. Dispatch a valid port event for which no adapter exists.
  // The event enters the bus, finds zero listeners, and vanishes.
  _missingAdapter() {
    appBus.dispatchEvent(new MissingCmd());
    this._log('Dispatched MissingCmd (no handler)', { type: MissingCmd.TYPE });
  }

  // 4. Dispatch an event that a broken adapter is listening to.
  // The adapter tries to construct an invalid outbound port -> TypeError.
  _brokenAdapter() {
    try {
      appBus.dispatchEvent(new BreakCmd());
      this._log('Dispatched BreakCmd', { type: BreakCmd.TYPE });
    } catch (err) {
      this._log('CATCHED ERROR (Broken Adapter)', err.message);
      console.error(err);
    }
  }
}

customElements.define('todo-app', TodoApp);

// --- Wiring ---
startAdapter(appBus);
startBrokenAdapter(appBus);
</script>
</body>
</html>
