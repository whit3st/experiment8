<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>test-10 - typed-bus + typed-store</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #10131a;
      color: #f3f5f7;
    }

    main {
      max-width: 28rem;
      margin: 4rem auto;
      padding: 2rem;
      background: #171c25;
      border: 1px solid #283142;
      border-radius: 16px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
    }

    p {
      margin: 0;
      color: #b4bfce;
      line-height: 1.5;
    }

    .count {
      margin: 1.5rem 0;
      font-size: 3rem;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 0.8rem 1.1rem;
      font: inherit;
      cursor: pointer;
    }

    .primary {
      background: #7c9cff;
      color: #0a1020;
    }

    .secondary {
      background: #273142;
      color: #f3f5f7;
    }

    code {
      color: #8fc7ff;
    }
  </style>
</head>
<body>
  <main>
    <h1>typed-bus + typed-store</h1>
    <p>
      Buttons dispatch bus commands. The store keeps the current truth.
    </p>
    <div id="count" class="count">0</div>
    <div class="actions">
      <button id="increment" class="primary" type="button">Increment</button>
      <button id="reset" class="secondary" type="button">Reset</button>
    </div>
    <p style="margin-top: 1rem;">
      Flow: <code>UI -> bus -> store -> render</code>
    </p>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
